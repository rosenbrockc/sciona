name: release-validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  release-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,hunter,architect,indexer,synthesizer,python-target]"

      - name: Run release validation
        run: ageom release-validate --output build/release_validation

      - name: Upload release validation bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-validation
          path: build/release_validation
