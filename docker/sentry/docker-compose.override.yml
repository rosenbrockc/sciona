services:
  nginx:
    environment:
      VIRTUAL_HOST: ${SENTRY_HOSTNAME:-sentry.localhost}
      LETSENCRYPT_HOST: ${SENTRY_HOSTNAME:-sentry.localhost}
      LETSENCRYPT_EMAIL: ${ACME_EMAIL:-admin@localhost}
      VIRTUAL_PORT: "80"
      VIRTUAL_PROTO: http
    networks:
      - default
      - proxy-tier

  relay:
    networks:
      - default
      - backend-internal

networks:
  proxy-tier:
    external: true
  backend-internal:
    external: true
