services:
  postgresql:
    image: postgres:14-alpine
    container_name: temporal-postgres
    restart: always
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=${TEMPORAL_PG_PASSWORD}
    volumes:
      - temporal-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - temporal-internal

  temporal:
    image: temporalio/auto-setup:1.22.4
    container_name: temporal-server
    restart: always
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${TEMPORAL_PG_PASSWORD}
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD-SHELL", "temporal operator cluster health --address localhost:7233 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - temporal-internal
      - proxy-tier # Only needed if workers connect from outside, otherwise keep internal

  temporal-ui:
    image: temporalio/ui:2.22.2
    container_name: temporal-ui
    restart: always
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
      - VIRTUAL_HOST=temporal.${DOMAIN}
      - LETSENCRYPT_HOST=temporal.${DOMAIN}
      - VIRTUAL_PORT=8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - temporal-internal
      - proxy-tier

volumes:
  temporal-db-data:

networks:
  temporal-internal:
    internal: true
  proxy-tier:
    external: true
