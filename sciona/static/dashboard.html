<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGEO Telemetry Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <header>
    <h1>AGEO Telemetry Dashboard</h1>
    <div class="toolbar">
      <span id="last-refresh">refresh: --</span>
      <label for="state-filter">state</label>
      <select id="state-filter">
        <option value="all">all</option>
        <option value="running">running</option>
        <option value="completed">completed</option>
        <option value="failed">failed</option>
      </select>
      <button id="btn-refresh">refresh now</button>
    </div>
  </header>

  <main>
    <section class="card" id="runs">
      <h2>Runs</h2>
      <div id="run-list"></div>
    </section>

    <section id="details">
      <section class="card">
        <nav class="tab-bar" id="tab-bar">
          <button class="active" data-tab="overview">Overview</button>
          <button data-tab="timeline">Timeline</button>
          <button data-tab="coverage">Coverage</button>
          <button data-tab="errors">Errors</button>
        </nav>

        <div class="tab-body">
          <!-- Overview tab -->
          <div id="tab-overview" class="tab-content active">
            <div id="summary"></div>
            <div id="meta-block">Select a run to inspect details.</div>
            <div class="split">
              <div class="card">
                <h2>Stages</h2>
                <div class="table-wrap"><table id="stages-table"></table></div>
              </div>
              <div class="card">
                <h2>Prompt Aggregates</h2>
                <div class="table-wrap"><table id="prompts-table"></table></div>
              </div>
            </div>
            <div class="card dashboard-section-card">
              <h2>In-Flight Dispatches</h2>
              <div class="table-wrap"><table id="inflight-table"></table></div>
            </div>
          </div>

          <!-- Timeline tab -->
          <div id="tab-timeline" class="tab-content">
            <div class="timeline-controls">
              <select id="tl-round-filter">
                <option value="">all rounds</option>
                <option value="architect">architect</option>
                <option value="hunter">hunter</option>
                <option value="synthesizer">synthesizer</option>
                <option value="llm">llm</option>
                <option value="ingester">ingester</option>
              </select>
              <select id="tl-type-filter">
                <option value="">all types</option>
              </select>
              <input type="text" id="tl-search" class="timeline-search" placeholder="filter prompt_key / node_id">
              <label><input type="checkbox" id="tl-live"> <span class="sse-indicator" id="sse-dot"></span>Live</label>
              <span id="tl-count" class="timeline-count"></span>
            </div>
            <div id="timeline-list" class="timeline-list"></div>
            <div class="timeline-more is-hidden" id="tl-more-wrap">
              <button id="tl-load-more">Load more</button>
            </div>
          </div>

          <!-- Coverage tab -->
          <div id="tab-coverage" class="tab-content">
            <div class="coverage-summary" id="coverage-summary"></div>
            <div class="table-wrap">
              <table id="coverage-table"></table>
            </div>
          </div>

          <!-- Errors tab -->
          <div id="tab-errors" class="tab-content">
            <div id="error-summary" class="error-summary"></div>
            <div id="error-list" class="error-list"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
