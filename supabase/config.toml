# Local Supabase CLI configuration for the Sciona migration work.
# Secret material stays in environment variables or in the linked Supabase
# project metadata and is intentionally not committed here.

project_id = "sciona"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.external.github]
enabled = true
client_id = "env(SUPABASE_GITHUB_CLIENT_ID)"
secret = "env(SUPABASE_GITHUB_CLIENT_SECRET)"

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "50MiB"
