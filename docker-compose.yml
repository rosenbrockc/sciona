services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/ageom_dev
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  visualizer:
    build:
      context: .
      dockerfile: Dockerfile.visualizer
    ports:
      - "8080:8080"
    environment:
      AGEOM_NEO4J_URI: bolt://neo4j:7687
      AGEOM_NEO4J_USER: neo4j
      AGEOM_NEO4J_PASSWORD: ageom_dev
    depends_on:
      - neo4j

volumes:
  neo4j_data:
