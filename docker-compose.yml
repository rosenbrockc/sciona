services:
  memgraph:
    image: memgraph/memgraph
    ports:
      - "7687:7687"
    command: ["--bolt-server-name-for-init=Neo4j/"]
    volumes:
      - memgraph_data:/var/lib/memgraph

  visualizer:
    build:
      context: .
      dockerfile: Dockerfile.visualizer
    ports:
      - "8080:8080"
    environment:
      AGEOM_MEMGRAPH_URI: bolt://memgraph:7687
      AGEOM_MEMGRAPH_USER: ""
      AGEOM_MEMGRAPH_PASSWORD: ""
    depends_on:
      - memgraph

volumes:
  memgraph_data:
