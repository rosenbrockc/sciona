services:
  memgraph:
    image: memgraph/memgraph-mage
    ports:
      - "7687:7687"
    command: ["--bolt-server-name-for-init=Neo4j/"]
    volumes:
      - memgraph_data:/var/lib/memgraph

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: sciona_architect
      POSTGRES_USER: sciona
      POSTGRES_PASSWORD: sciona_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data

  visualizer:
    build:
      context: .
      dockerfile: Dockerfile.visualizer
    ports:
      - "8080:8080"
    environment:
      SCIONA_MEMGRAPH_URI: bolt://memgraph:7687
      SCIONA_MEMGRAPH_USER: ""
      SCIONA_MEMGRAPH_PASSWORD: ""
    depends_on:
      - memgraph

volumes:
  memgraph_data:
  postgres_data:
